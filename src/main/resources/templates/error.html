<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>出错了 - 图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body text-center p-5">
                    <h1 class="display-4 text-danger mb-4">Oops</h1>
                    <h2 class="card-title mb-3" th:text="${errorTitle}">错误</h2>
                    <p class="card-text text-muted" th:text="${errorMessage}">系统发生异常。</p>
                    <a href="/" class="btn btn-primary mt-3">返回首页</a>
                    <a href="/books" class="btn btn-outline-primary mt-3 ms-2">图书列表</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
