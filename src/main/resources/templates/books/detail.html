<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>图书详情 - 图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">图书管理系统</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/books">图书列表</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/books/add">添加图书</a>
                </li>
            </ul>
            <div class="d-flex align-items-center text-light">
                <span class="me-3" sec:authentication="name">用户名</span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button class="btn btn-outline-light btn-sm" type="submit">退出登录</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">图书详情</h2>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title" th:text="${book.name}">图书名称</h5>
            <p class="card-text"><strong>ID：</strong><span th:text="${book.id}"></span></p>
            <p class="card-text"><strong>类别：</strong><span th:text="${book.category} ?: '无'"></span></p>
            <p class="card-text"><strong>作者：</strong><span th:text="${book.author} ?: '无'"></span></p>
            <p class="card-text"><strong>出版社：</strong><span th:text="${book.publisher} ?: '无'"></span></p>
            <p class="card-text"><strong>版本：</strong><span th:text="${book.version} ?: '无'"></span></p>
            <p class="card-text"><strong>创建时间：</strong><span th:text="${#temporals.format(book.createTime, 'yyyy-MM-dd HH:mm')}"></span></p>
            <p class="card-text"><strong>更新时间：</strong><span th:text="${#temporals.format(book.updateTime, 'yyyy-MM-dd HH:mm')}"></span></p>
        </div>
    </div>

    <div class="mt-3">
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-warning">编辑</a>
        <a href="/books" class="btn btn-secondary ms-2">返回列表</a>
    </div>
</div>
</body>
</html>
