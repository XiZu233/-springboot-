<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="p-5 mb-4 bg-light rounded-3">
        <div class="container-fluid py-5">
            <h1 class="display-5 fw-bold">图书管理系统</h1>
            <p class="col-md-8 fs-4">欢迎使用本系统，请先登录后管理图书信息。</p>
            <div sec:authorize="!isAuthenticated()">
                <a class="btn btn-primary btn-lg" href="/login" role="button">登录</a>
                <a class="btn btn-outline-primary btn-lg ms-2" href="/register" role="button">注册</a>
            </div>
            <div sec:authorize="isAuthenticated()">
                <a class="btn btn-primary btn-lg" href="/books" role="button">进入图书管理</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
