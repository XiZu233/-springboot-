<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册 - 图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .form-register { max-width: 360px; padding: 15px; margin: 60px auto; }
    </style>
</head>
<body>
<div class="container">
    <form class="form-register bg-white rounded shadow-sm p-4" th:action="@{/register}" th:object="${registerRequest}" method="post">
        <h2 class="mb-4 text-center">用户注册</h2>

        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="mb-3">
            <label for="username" class="form-label">用户名</label>
            <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="请输入用户名" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">密码</label>
            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="请输入密码" required>
        </div>
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">确认密码</label>
            <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" placeholder="请再次输入密码" required>
        </div>

        <button class="btn btn-success w-100" type="submit">注册</button>
        <hr class="my-4">
        <p class="text-center mb-0">已有账号？<a th:href="@{/login}">返回登录</a></p>
    </form>
</div>
</body>
</html>
