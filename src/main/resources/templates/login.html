<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - 图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .form-signin { max-width: 360px; padding: 15px; margin: 80px auto; }
    </style>
</head>
<body>
<div class="container">
    <form class="form-signin bg-white rounded shadow-sm p-4" th:action="@{/login}" method="post">
        <h2 class="mb-4 text-center">用户登录</h2>

        <div class="alert alert-danger" th:if="${param.error}">
            用户名或密码错误，请重新输入。
        </div>
        <div class="alert alert-success" th:if="${param.registered}">
            注册成功，请登录。
        </div>
        <div class="alert alert-info" th:if="${param.logout}">
            您已成功退出登录。
        </div>

        <div class="mb-3">
            <label for="username" class="form-label">用户名</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required autofocus>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">密码</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
        </div>

        <button class="btn btn-primary w-100" type="submit">登录</button>
        <hr class="my-4">
        <p class="text-center mb-0">还没有账号？<a th:href="@{/register}">立即注册</a></p>
    </form>
</div>
</body>
</html>
