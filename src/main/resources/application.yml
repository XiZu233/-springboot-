spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/book_management?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false"
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
